<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Registrarse - Stocke al Toque</title>
<script>
fetch("/registrarse.html")
  .then((response) => response.text())
  .then((html) => {
    document.open();
    document.write(html);
    document.close();
  })
  .catch(() => {
    window.location.replace("/registrarse.html");
  });
</script>
</head>
<body></body>
</html>
